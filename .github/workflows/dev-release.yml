name: Development Release

on:
  push:
    branches:
      - devel
      - develop
      - development

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CalVer version
        id: version
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%-m)
          FIRST_OF_MONTH=$(date +%Y-%m-01)
          COUNT=$(git rev-list --count --since="$FIRST_OF_MONTH" HEAD)
          if [ "$COUNT" = "0" ]; then
            COUNT=1
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${YEAR}.${MONTH}.${COUNT}-dev.${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            artifact: hyprsync-linux-amd64
          - os: ubuntu-latest
            arch: aarch64
            artifact: hyprsync-linux-arm64
          - os: macos-latest
            arch: x86_64
            artifact: hyprsync-macos-amd64
          - os: macos-14
            arch: arm64
            artifact: hyprsync-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git

      - name: Install cross-compiler (Linux ARM64)
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      - name: Clone vendored dependencies
        run: |
          mkdir -p vendor
          git clone --depth 1 https://github.com/marzer/tomlplusplus.git vendor/tomlplusplus
          git clone --depth 1 https://github.com/gabime/spdlog.git vendor/spdlog
          git clone --depth 1 https://github.com/google/googletest.git vendor/googletest

      - name: Build (Linux x86_64)
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build -j$(nproc)

      - name: Build (Linux ARM64)
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          cmake --build build -j$(nproc)

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Prepare release asset
        run: |
          cp build/hyprsync ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git

      - name: Clone vendored dependencies
        run: |
          mkdir -p vendor
          git clone --depth 1 https://github.com/marzer/tomlplusplus.git vendor/tomlplusplus
          git clone --depth 1 https://github.com/gabime/spdlog.git vendor/spdlog
          git clone --depth 1 https://github.com/google/googletest.git vendor/googletest

      - name: Build with tests
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON
          cmake --build build -j$(nproc)

      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure

  release:
    needs: [version, build, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/hyprsync-linux-amd64/hyprsync-linux-amd64 release/
          cp artifacts/hyprsync-linux-arm64/hyprsync-linux-arm64 release/
          cp artifacts/hyprsync-macos-amd64/hyprsync-macos-amd64 release/
          cp artifacts/hyprsync-macos-arm64/hyprsync-macos-arm64 release/
          chmod +x release/*

      - name: Delete previous dev release
        run: |
          gh release delete dev --yes || true
          git push origin :refs/tags/dev || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Development Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev
          name: Development Build (${{ needs.version.outputs.version }})
          body: |
            ## Development Build
            
            **Version:** ${{ needs.version.outputs.version }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            
            > This is a development pre-release. Use at your own risk.
            
            ### Downloads
            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 (Intel/AMD) | `hyprsync-linux-amd64` |
            | Linux | ARM64 | `hyprsync-linux-arm64` |
            | macOS | x86_64 (Intel) | `hyprsync-macos-amd64` |
            | macOS | ARM64 (Apple Silicon) | `hyprsync-macos-arm64` |
            
            ### Install (Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/r2unit/hyprsync/devel/install.sh | bash -s -- --dev
            ```
          files: |
            release/hyprsync-linux-amd64
            release/hyprsync-linux-arm64
            release/hyprsync-macos-amd64
            release/hyprsync-macos-arm64
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
